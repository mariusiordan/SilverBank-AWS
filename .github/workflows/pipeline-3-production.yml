name: CD - Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: mariusiordan
  ANSIBLE_HOST_KEY_CHECKING: "False"
  MONITOR_DURATION: 60
  MONITOR_INTERVAL: 30

jobs:
  # ============================================================
  # JOB 1 - Promote the validated staging image
  # No rebuild: the ':staging' image already passed integration
  # tests, so we only add a ':latest' tag to the same digest.
  # This guarantees production runs exactly what was tested.
  # ============================================================
  promote-image:
    name: Promote staging image to production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.promote.outputs.digest }}
    steps:
      - name: Authenticate to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag staging images as production
        id: promote
        run: |
          for IMAGE in silverbank-backend silverbank-frontend; do
            SRC="${REGISTRY}/${OWNER}/${IMAGE}:staging"
            DST="${REGISTRY}/${OWNER}/${IMAGE}:latest"
            echo "Promoting $IMAGE ..."
            docker buildx imagetools create --tag "$DST" "$SRC"
          done
          DIGEST=$(docker buildx imagetools inspect "${REGISTRY}/${OWNER}/silverbank-backend:latest" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "✅ Images promoted without rebuild"
          echo "   Backend digest: ${DIGEST}"
          echo "   Production now points at the image validated on staging"

  # ============================================================
  # JOB 2 - Release approval gate
  # Blocks until a release manager approves in GitHub Environments
  # ============================================================
  approval:
    name: Await release approval
    needs: promote-image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Record approval
        run: |
          echo "✅ Release approved by ${{ github.actor }}"
          echo "   Proceeding with Blue/Green deployment to production"

  # ============================================================
  # JOB 3 - Deploy to the idle environment
  # Traffic still flows to the active colour throughout this job
  # ============================================================
  deploy-to-idle:
    name: Deploy to idle environment
    needs: approval
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      idle: ${{ steps.detect.outputs.idle }}
      active: ${{ steps.detect.outputs.active }}
    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          path: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422060263377:role/silverbank-github-actions-role
          aws-region: eu-west-2

      - name: Install Ansible and SSM tooling
        run: |
          pip install ansible boto3 > /dev/null
          ansible-galaxy collection install community.aws > /dev/null
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o smp.deb
          sudo dpkg -i smp.deb > /dev/null
          echo "✅ Tooling ready"

      - name: Provide Ansible Vault password
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > $HOME/.vault-password
          chmod 600 $HOME/.vault-password

      - name: Build SSM inventory from live instances
        working-directory: infra/aws-silverbank/ansible
        run: |
          get_id() {
            aws ec2 describe-instances --region eu-west-2 \
              --filters "Name=tag:Name,Values=$1" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text
          }
          cat > inventory-ssm.ini << INV
          [edge]
          edge-nginx ansible_aws_ssm_instance_id=$(get_id edge-nginx)
          [prod]
          prod-vm1-BLUE ansible_aws_ssm_instance_id=$(get_id prod-vm1-BLUE)
          prod-vm2-GREEN ansible_aws_ssm_instance_id=$(get_id prod-vm2-GREEN)
          [db]
          db-postgresql ansible_aws_ssm_instance_id=$(get_id db-postgresql)
          [monitoring]
          monitoring-staging ansible_aws_ssm_instance_id=$(get_id monitoring-staging)
          [all:vars]
          ansible_connection=community.aws.aws_ssm
          ansible_aws_ssm_region=eu-west-2
          ansible_aws_ssm_bucket_name=silverbank-ssm-transfer-mariusiordan
          ansible_aws_ssm_bucket_prefix=ssm-transfer
          ansible_python_interpreter=/usr/bin/python3
          ansible_remote_tmp=/tmp/.ansible-tmp
          ansible_aws_ssm_document_name=AWS-StartNonInteractiveCommand
          ansible_become=true
          INV
          echo "✅ Inventory generated from current instance IDs"

      - name: Reclaim disk space on application hosts
        working-directory: infra/aws-silverbank/ansible
        run: |
          ansible prod:db -i inventory-ssm.ini -m shell \
            -a "docker container prune -f; docker image prune -f; echo '--- disk:'; df -h / | tail -1"
          echo "✅ Stopped containers and dangling images removed"

      - name: Identify active and idle environments
        id: detect
        working-directory: infra/aws-silverbank/ansible
        run: |
          ACTIVE=$(ansible edge -i inventory-ssm.ini -m shell \
            -a "grep -E '^\s*server.*:3000' /etc/nginx/conf.d/upstream.conf | grep -ioE 'blue|green' | head -1" \
            | grep -ioE 'blue|green' | head -1 | tr '[:upper:]' '[:lower:]')
          if [ "$ACTIVE" = "blue" ]; then IDLE=green; else IDLE=blue; fi
          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "idle=$IDLE" >> "$GITHUB_OUTPUT"
          echo "✅ Serving traffic: ${ACTIVE^^} | Deploy target: ${IDLE^^}"

      - name: Back up production database to S3
        working-directory: infra/aws-silverbank/ansible
        run: |
          echo "Creating a database backup before touching production..."
          ansible db -i inventory-ssm.ini -m shell -a "/opt/backup-db.sh"
          echo "✅ Database backed up to S3 - restore point available if this release fails"

      - name: Deploy application to idle host
        working-directory: infra/aws-silverbank/ansible
        run: |
          IDLE="${{ steps.detect.outputs.idle }}"
          if [ "$IDLE" = "green" ]; then LIMIT="prod-vm2-GREEN"; else LIMIT="prod-vm1-BLUE"; fi
          ansible-playbook playbooks/deploy-production.yml \
            -i inventory-ssm.ini --limit "$LIMIT" -e "app_tag=latest"
          echo "✅ ${IDLE^^} is running the promoted image - traffic unchanged"

      - name: Remove vault password
        if: always()
        run: rm -f $HOME/.vault-password

  # ============================================================
  # JOB 4 - Switch traffic and observe
  # Sets 'stable' output so the rollback job knows whether to run
  # ============================================================
  switch-and-monitor:
    name: Switch traffic and monitor
    needs: deploy-to-idle
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      stable: ${{ steps.monitor.outputs.stable }}
    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          path: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422060263377:role/silverbank-github-actions-role
          aws-region: eu-west-2

      - name: Install Ansible and SSM tooling
        run: |
          pip install ansible boto3 > /dev/null
          ansible-galaxy collection install community.aws > /dev/null
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o smp.deb
          sudo dpkg -i smp.deb > /dev/null

      - name: Provide Ansible Vault password
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > $HOME/.vault-password
          chmod 600 $HOME/.vault-password

      - name: Build SSM inventory for the edge host
        working-directory: infra/aws-silverbank/ansible
        run: |
          EDGE=$(aws ec2 describe-instances --region eu-west-2 \
            --filters "Name=tag:Name,Values=edge-nginx" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          cat > inventory-ssm.ini << INV
          [edge]
          edge-nginx ansible_aws_ssm_instance_id=$EDGE
          [all:vars]
          ansible_connection=community.aws.aws_ssm
          ansible_aws_ssm_region=eu-west-2
          ansible_aws_ssm_bucket_name=silverbank-ssm-transfer-mariusiordan
          ansible_aws_ssm_bucket_prefix=ssm-transfer
          ansible_python_interpreter=/usr/bin/python3
          ansible_remote_tmp=/tmp/.ansible-tmp
          ansible_aws_ssm_document_name=AWS-StartNonInteractiveCommand
          ansible_become=true
          INV

      - name: Switch nginx traffic to the new environment
        working-directory: infra/aws-silverbank/ansible
        run: |
          IDLE="${{ needs.deploy-to-idle.outputs.idle }}"
          ansible edge -i inventory-ssm.ini -m shell -a "/opt/switch-backend.sh $IDLE"
          echo "✅ Traffic now served by ${IDLE^^}"

      - name: Verify service immediately after switch
        working-directory: infra/aws-silverbank/ansible
        run: |
          sleep 5
          if ansible edge -i inventory-ssm.ini -m shell -a "curl -sf http://localhost/api/health" > /dev/null 2>&1; then
            echo "✅ Service healthy immediately after switch"
          else
            echo "❌ Service did not respond after switch"
            exit 1
          fi

      - name: Observe production health
        id: monitor
        working-directory: infra/aws-silverbank/ansible
        run: |
          IDLE="${{ needs.deploy-to-idle.outputs.idle }}"
          ELAPSED=0
          STABLE=true
          echo "🔍 Observing ${IDLE^^} for ${MONITOR_DURATION}s (every ${MONITOR_INTERVAL}s)"
          while [ $ELAPSED -lt $MONITOR_DURATION ]; do
            if ansible edge -i inventory-ssm.ini -m shell -a "curl -sf http://localhost/api/health" > /dev/null 2>&1; then
              echo "  ✅ [${ELAPSED}s/${MONITOR_DURATION}s] healthy"
            else
              echo "  ❌ [${ELAPSED}s/${MONITOR_DURATION}s] health check failed"
              STABLE=false
              break
            fi
            sleep $MONITOR_INTERVAL
            ELAPSED=$((ELAPSED + MONITOR_INTERVAL))
          done
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          if [ "$STABLE" = "false" ]; then
            echo "❌ Instability detected - rollback will be triggered"
            exit 1
          fi
          echo ""
          echo "✅ Production stable for ${MONITOR_DURATION}s on ${IDLE^^}"

      - name: Remove vault password
        if: always()
        run: rm -f $HOME/.vault-password

  # ============================================================
  # JOB 5 - Automatic rollback
  # Runs only when monitoring reported instability. The previous
  # environment is still running, so restoring traffic is instant.
  # ============================================================
  rollback:
    name: Roll back to previous environment
    needs: [deploy-to-idle, switch-and-monitor]
    if: always() && needs.switch-and-monitor.outputs.stable == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: mariusiordan/DevOps-final-project
          path: infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::422060263377:role/silverbank-github-actions-role
          aws-region: eu-west-2

      - name: Install Ansible and SSM tooling
        run: |
          pip install ansible boto3 > /dev/null
          ansible-galaxy collection install community.aws > /dev/null
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o smp.deb
          sudo dpkg -i smp.deb > /dev/null

      - name: Provide Ansible Vault password
        run: |
          echo "${{ secrets.VAULT_PASSWORD }}" > $HOME/.vault-password
          chmod 600 $HOME/.vault-password

      - name: Build SSM inventory for the edge host
        working-directory: infra/aws-silverbank/ansible
        run: |
          EDGE=$(aws ec2 describe-instances --region eu-west-2 \
            --filters "Name=tag:Name,Values=edge-nginx" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          cat > inventory-ssm.ini << INV
          [edge]
          edge-nginx ansible_aws_ssm_instance_id=$EDGE
          [all:vars]
          ansible_connection=community.aws.aws_ssm
          ansible_aws_ssm_region=eu-west-2
          ansible_aws_ssm_bucket_name=silverbank-ssm-transfer-mariusiordan
          ansible_aws_ssm_bucket_prefix=ssm-transfer
          ansible_python_interpreter=/usr/bin/python3
          ansible_remote_tmp=/tmp/.ansible-tmp
          ansible_aws_ssm_document_name=AWS-StartNonInteractiveCommand
          ansible_become=true
          INV

      - name: Restore traffic to the previous environment
        working-directory: infra/aws-silverbank/ansible
        run: |
          PREVIOUS="${{ needs.deploy-to-idle.outputs.active }}"
          echo "🔄 Restoring traffic to ${PREVIOUS^^} ..."
          ansible edge -i inventory-ssm.ini -m shell -a "/opt/switch-backend.sh $PREVIOUS"
          sleep 5
          ansible edge -i inventory-ssm.ini -m shell -a "curl -sf http://localhost/api/health" > /dev/null 2>&1 \
            && echo "✅ Rollback complete - ${PREVIOUS^^} serving traffic and healthy" \
            || echo "⚠️  Rollback executed but health check still failing - manual intervention required"

      - name: Remove vault password
        if: always()
        run: rm -f $HOME/.vault-password

  # ============================================================
  # JOB 6 - Deployment result
  # ============================================================
  summary:
    name: Deployment result
    needs: [promote-image, approval, deploy-to-idle, switch-and-monitor, rollback]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report outcome
        run: |
          PROMOTE="${{ needs.promote-image.result }}"
          APPROVE="${{ needs.approval.result }}"
          DEPLOY="${{ needs.deploy-to-idle.result }}"
          MONITOR="${{ needs.switch-and-monitor.result }}"
          ROLLBACK="${{ needs.rollback.result }}"
          LIVE="${{ needs.deploy-to-idle.outputs.idle }}"
          PREV="${{ needs.deploy-to-idle.outputs.active }}"

          echo "════════════════════════════════════════════"
          echo "  CD - PRODUCTION DEPLOYMENT"
          echo "════════════════════════════════════════════"
          echo "  Promote image      : $PROMOTE"
          echo "  Release approval   : $APPROVE"
          echo "  Deploy to idle     : $DEPLOY"
          echo "  Switch and monitor : $MONITOR"
          echo "  Rollback           : $ROLLBACK"
          echo "════════════════════════════════════════════"

          if [ "$MONITOR" = "success" ]; then
            echo "  ✅ DEPLOYMENT SUCCESSFUL"
            echo "     Live environment : ${LIVE^^}"
            echo "     Standby          : ${PREV^^} (ready for next release)"
            echo "     Monitored ${MONITOR_DURATION}s with no failures"
            echo "════════════════════════════════════════════"
          elif [ "$ROLLBACK" = "success" ]; then
            echo "  ⚠️  DEPLOYMENT ROLLED BACK"
            echo "     Traffic restored to ${PREV^^}"
            echo "     Investigate the failed release before retrying"
            echo "════════════════════════════════════════════"
            exit 1
          else
            echo "  ❌ DEPLOYMENT FAILED"
            [ "$PROMOTE" != "success" ] && echo "     Image promotion failed"
            [ "$APPROVE" = "skipped" ] && echo "     Release was not approved"
            [ "$DEPLOY" != "success" ] && [ "$APPROVE" = "success" ] && echo "     Deploy to idle failed - traffic never switched"
            echo "════════════════════════════════════════════"
            exit 1
          fi
