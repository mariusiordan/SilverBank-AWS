name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          VERSION="v1.0"
          SHA=$(git rev-parse --short HEAD)
          echo "tag=${VERSION}-sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "Building tag: ${VERSION}-sha-${SHA}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/silverbank-backend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/silverbank-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=
          tags: |
            ghcr.io/${{ github.repository_owner }}/silverbank-frontend:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/silverbank-frontend:latest