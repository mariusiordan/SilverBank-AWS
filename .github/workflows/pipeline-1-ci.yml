# .github/workflows/pipeline-1-ci.yml
#
# Pipeline 1 — Continuous Integration
# Trigger: Pull Request to main
#
# Flow:
#   lint
#     ├── test-jwt          ┐
#     ├── test-auth         ├── all must pass before merge
#     └── test-account      ┘
#           │
#           └── comment-on-failure (only if tests fail)

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ============================================================
  # JOB 1 — Lint
  # Runs ESLint on the frontend codebase
  # Must pass before any tests run
  # ============================================================
  lint:
    name: ESLint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci
          echo "✅ OK - Dependencies installed"

      - name: Run ESLint
        run: |
          echo "Running ESLint static analysis..."
          npm run lint
          echo "✅ OK - Lint passed"

  # ============================================================
  # JOB 2 — JWT Tests
  # Unit tests for JWT token generation and verification
  # Runs locally — no Docker needed, no database needed
  # Runs in parallel with Auth and Account tests after lint
  # ============================================================
  test-jwt:
    name: JWT Tests
    runs-on: ubuntu-24.04
    needs: lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run JWT tests
        run: |
          echo "Running JWT unit tests..."
          npx vitest run __tests__/jwt.test.ts
          echo "✅ OK - JWT tests passed"

  # ============================================================
  # JOB 3 — Auth Tests
  # Tests login and register endpoints
  # Runs inside Docker to match production environment exactly
  # Prisma is mocked — no real database needed
  # ============================================================
  test-auth:
    name: Auth Tests
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: |
          echo "Building backend test container..."
          docker build -t silverbank-test -f backend/Dockerfile.test ./backend
          echo "✅ OK - Test container built"

      - name: Run auth tests
        run: |
          echo "Running auth tests inside Docker..."
          docker run --rm silverbank-test \
            npx vitest run __tests__/login.test.ts __tests__/register.test.ts
          echo "✅ OK - Auth tests passed"

  # ============================================================
  # JOB 4 — Account Tests
  # Tests account endpoint with mocked Prisma
  # Runs inside Docker to match production environment exactly
  # ============================================================
  test-account:
    name: Account Tests
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: |
          echo "Building backend test container..."
          docker build -t silverbank-test -f backend/Dockerfile.test ./backend
          echo "✅ OK - Test container built"

      - name: Run account tests
        run: |
          echo "Running account tests inside Docker..."
          docker run --rm silverbank-test \
            npx vitest run __tests__/account.test.ts
          echo "✅ OK - Account tests passed"

  # ============================================================
  # JOB 5 — Comment on PR (only on failure)
  # Posts a comment on the PR if any test fails
  # Notifies the developer without checking the Actions tab
  # ============================================================
  comment-on-failure:
    name: Comment on PR
    runs-on: ubuntu-24.04
    needs: [test-jwt, test-auth, test-account]
    if: failure() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **CI Failed** — One or more tests failed on this PR.\n\nCheck the [Actions tab](' + context.payload.pull_request.html_url + '/checks) for details.'
            })