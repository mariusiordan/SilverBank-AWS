name: Deploy Test

on:
  workflow_dispatch:

jobs:
  read-infra:
    name: Read Terraform outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Read outputs from S3 state
        working-directory: terraform
        run: |
          echo "Initialising Terraform (reads state from S3)..."
          terraform init -reconfigure
          echo "---"
          echo "Edge IP:  $(terraform output -raw edge_elastic_ip)"
          echo "Blue IP:  $(terraform output -raw blue_private_ip)"
          echo "Green IP: $(terraform output -raw green_private_ip)"
          echo "---"
          echo "✅ Runner can read live infra state"